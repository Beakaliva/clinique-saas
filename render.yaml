services:
  - type: web
    name: clinique-backend
    env: python
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: clinique-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: FRONTEND_URL
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: CLINIC_TYPE
        value: "generale"

databases:
  - name: clinique-db
    plan: free
    databaseName: clinique
    region: frankfurt
